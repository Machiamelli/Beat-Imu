<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <title>Beat Imu</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a
      class="gh-link"
      href="https://github.com/Machiamelli/Beat-Imu"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="View on GitHub"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          fill="currentColor"
          d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.55v-2.1c-3.2.7-3.87-1.36-3.87-1.36-.52-1.33-1.27-1.68-1.27-1.68-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.02 1.76 2.68 1.25 3.34.96.1-.74.4-1.25.72-1.54-2.55-.29-5.23-1.28-5.23-5.69 0-1.26.45-2.28 1.18-3.09-.12-.29-.51-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11 11 0 0 1 5.79 0c2.21-1.49 3.18-1.18 3.18-1.18.62 1.59.23 2.76.11 3.05.73.81 1.17 1.83 1.17 3.09 0 4.42-2.69 5.39-5.25 5.68.41.36.78 1.06.78 2.14v3.17c0 .31.21.67.8.55C20.21 21.39 23.5 17.07 23.5 12 23.5 5.65 18.35.5 12 .5Z"
        />
      </svg>
      <span>GitHub</span>
    </a>
    <div class="app" id="app">
      <div class="stage" id="stage">
        <div class="imu-wrap" aria-hidden="true">
          <img src="assets/imu.png" alt="Imu" class="imu-img" />
        </div>
        <div class="defeat-label">Defeat IMU</div>

        <div class="result" id="result" role="status" aria-live="polite">
          <div id="resultImuFrame" class="result-imu-frame">
            <img id="resultImu" class="result-imu" alt="" />
          </div>
          <h2 id="resultTitle">—</h2>
          <button
            class="restart-btn"
            id="replayBtn"
            type="button"
            aria-label="Restart"
          >
            <svg viewBox="0 0 24 24">
              <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" />
              <path d="M21 3v5h-5" />
            </svg>
          </button>
        </div>
      </div>

      <div class="slots" id="slots"></div>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
